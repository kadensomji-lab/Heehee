<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Button</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Button">
  <meta name="theme-color" content="#000000">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    button {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #ff6666, #cc0000 55%, #8b0000);
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      box-shadow:
        0 0 0 6px #1a0000,
        0 0 0 8px #330000,
        0 8px 40px rgba(200, 0, 0, 0.5),
        0 2px 8px rgba(0, 0, 0, 0.8);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
      will-change: transform;
    }

    button:active,
    button.pressed {
      transform: scale(0.93);
      box-shadow:
        0 0 0 6px #1a0000,
        0 0 0 8px #330000,
        0 4px 20px rgba(200, 0, 0, 0.35),
        0 1px 4px rgba(0, 0, 0, 0.9);
      filter: brightness(0.85);
    }

    @media (max-width: 390px) {
      button {
        width: 190px;
        height: 190px;
      }
    }
  </style>
</head>
<body>

  <button id="btn" aria-label="Play sound"></button>

  <script>
    const btn = document.getElementById('btn');
    let audio = null;

    function play() {
      if (audio) {
        audio.pause();
        audio.currentTime = 0;
      }
      audio = new Audio('sound.mp3');
      audio.volume = 1.0;
      audio.loop = false;
      audio.play().catch(() => {});
    }

    btn.addEventListener('click', play);

    // Visual feedback on touch for snappier feel
    btn.addEventListener('touchstart', () => btn.classList.add('pressed'), { passive: true });
    btn.addEventListener('touchend',   () => btn.classList.remove('pressed'), { passive: true });
    btn.addEventListener('touchcancel',() => btn.classList.remove('pressed'), { passive: true });
  </script>

</body>
</html>
